# ---------- Server ----------
server.port=${PORT:8080}

# ---------- H2 Database ----------
# In-memory database: fast, and reseeds automatically from data.sql on every restart.
# Switch to a file-based URL (e.g. jdbc:h2:file:./data/gaulensdb) if you want data
# to persist between restarts — just remember to remove the INSERTs in data.sql
# after the first run so they don't clash with existing rows.
spring.datasource.url=jdbc:h2:mem:gaulensdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console
# JDBC URL to paste in on that page: jdbc:h2:mem:gaulensdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Run data.sql after Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ---------- File upload limits ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
